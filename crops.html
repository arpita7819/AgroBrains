<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgroBrains - Crop Advisor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav>
    <div class="logo">🌾 AgroBrains</div>

    <div class="hamburger" id="hamburger">
        ☰
    </div>

    <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="crops.html">Crop Advisor</a></li>
        <li><a href="weather.html">Weather</a></li>
        <li><a href="market.html">Market</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>


<!-- MAIN CONTENT -->

<section class="contact" style="margin-top:100px;">

<h2>🌱 Smart Crop Advisor</h2>

<!-- FORM -->

<label>Soil Type:</label><br>
<select id="soil">
<option value="">Select Soil</option>
<option value="black">Black Soil</option>
<option value="loamy">Loamy Soil</option>
<option value="sandy">Sandy Soil</option>
</select>

<br><br>

<label>Season:</label><br>
<select id="season">
<option value="">Select Season</option>
<option value="summer">Summer</option>
<option value="winter">Winter</option>
<option value="rainy">Rainy</option>
</select>

<br><br>

<label>Temperature (°C):</label><br>
<input type="number" id="temp" placeholder="Enter temperature">

<br><br>

<label>Rainfall (mm):</label><br>
<input type="number" id="rain" placeholder="Enter rainfall">

<br><br>

<button onclick="recommendCrop()">Get Recommendation</button>

<br><br>

<!-- RESULT -->

<div id="result" style="
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
max-width:400px;
margin:auto;
"></div>

</section>


<!-- FOOTER -->

<footer>
<p>© 2026 AgroBrains | Developed by Arpita</p>
</footer>


<!-- JS FILE -->

<script src="script.js"></script>
<style>
    
    select, 
    input[type="number"] {
        width: 100%;          
        max-width: 400px;      
        padding: 12px;         
        margin: 8px 0;        
        display: inline-block;
        border: 1px solid #ccc;
        border-radius: 8px;   
        box-sizing: border-box; 
        font-family: inherit;  
    }

   
    button {
        width: 100%;
        max-width: 400px;
        padding: 12px;
        background-color: #2ecc71; 
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background-color: #27ae60;
    }
</style>

</body>
</html>
